<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 管理後台 — 莉刻報名系統</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
</head>

<body>

    <!-- Login Screen -->
    <div class="login-container" id="loginScreen">
        <div class="card login-card">
            <div class="card-header">
                <span class="icon">🔐</span>
                <h2>管理員登入</h2>
            </div>
            <p id="loginHint" style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 16px;"></p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginPassword">管理員密碼</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="輸入密碼" required
                        minlength="4" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">登入</button>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard (hidden until login) -->
    <div class="container-wide" id="adminDashboard" style="display: none;">

        <!-- Top Bar -->
        <div class="admin-topbar">
            <h1>🎮 莉刻報名系統</h1>
            <div class="connection-info">
                <span>👥 在線人數：</span>
                <span class="count" id="clientCount">0</span>
                <button class="sound-toggle" id="soundToggle" title="通知音效">🔔</button>
            </div>
        </div>

        <!-- Share URL -->
        <div class="url-bar" id="shareUrlBar">
            <span>📎</span>
            <code id="shareUrl">載入中...</code>
            <button class="btn btn-sm btn-outline" id="copyUrlBtn">複製</button>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="session">📋 場次管理</button>
            <button class="tab" data-tab="registrations">👥 報名列表</button>
            <button class="tab" data-tab="chat">💬 聊天室</button>
            <button class="tab" data-tab="settings">⚙️ 設定</button>
        </div>

        <!-- Tab: Session Management -->
        <div class="tab-content active" id="tab-session">
            <div class="admin-layout">
                <div>
                    <!-- Session Controls -->
                    <div class="card" id="sessionControlCard">
                        <div class="card-header">
                            <span class="icon">🎯</span>
                            <h2>場次控制</h2>
                            <span class="badge" id="sessionStatusBadge">—</span>
                        </div>

                        <div id="noSessionView">
                            <p style="color: var(--text-secondary); margin-bottom: 16px; font-size: 0.9rem;">
                                目前沒有進行中的場次，請建立新場次開始接受報名。</p>
                            <div class="form-group">
                                <label>場次標題</label>
                                <input type="text" id="newTitle" class="form-input" placeholder="例：今晚吃雞第三場"
                                    maxlength="50">
                            </div>
                            <div class="config-grid">
                                <div class="form-group">
                                    <label>正選名額</label>
                                    <input type="number" id="newMainSlots" class="form-input" value="6" min="1"
                                        max="100">
                                </div>
                                <div class="form-group">
                                    <label>備取名額</label>
                                    <input type="number" id="newWaitlistSlots" class="form-input" value="2" min="0"
                                        max="100">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>遲到者處理方式</label>
                                <select id="newLatePolicy" class="form-input">
                                    <option value="waitlist">自動移到備取</option>
                                    <option value="reject">直接不錄取</option>
                                    <option value="none">不特別處理</option>
                                </select>
                            </div>
                            <button class="btn btn-success btn-block" id="createSessionBtn">
                                <span>🚀</span> 建立場次並開始報名
                            </button>
                        </div>

                        <div id="activeSessionView" style="display: none;">
                            <div class="status-bar">
                                <div class="status-indicator">
                                    <span class="status-dot online"></span>
                                    <span class="status-text">報名進行中</span>
                                </div>
                                <div class="slot-counter" id="adminSlotCounter">--</div>
                            </div>
                            <div class="progress-bar" style="margin-bottom: 16px;">
                                <div class="progress-fill" id="adminProgressFill" style="width: 0%"></div>
                            </div>

                            <div class="config-grid" style="margin-bottom: 16px;">
                                <div class="form-group">
                                    <label>正選名額</label>
                                    <input type="number" id="editMainSlots" class="form-input" min="1" max="100">
                                </div>
                                <div class="form-group">
                                    <label>備取名額</label>
                                    <input type="number" id="editWaitlistSlots" class="form-input" min="0" max="100">
                                </div>
                            </div>
                            <div class="form-group" style="margin-bottom: 16px;">
                                <label>遲到者處理方式</label>
                                <select id="editLatePolicy" class="form-input">
                                    <option value="waitlist">自動移到備取</option>
                                    <option value="reject">直接不錄取</option>
                                    <option value="none">不特別處理</option>
                                </select>
                            </div>
                            <button class="btn btn-outline btn-block" id="updateSessionBtn"
                                style="margin-bottom: 10px;">
                                💾 儲存設定
                            </button>

                            <div class="btn-group">
                                <button class="btn btn-primary" id="autoSelectBtn" style="flex:1;">
                                    ⚡ 按時間自動錄取
                                </button>
                                <button class="btn btn-outline" id="resetStatusesBtn" style="flex:1;">
                                    ⏳ 重設所有狀態
                                </button>
                            </div>
                            <div class="btn-group" style="margin-top: 8px;">
                                <button class="btn btn-success" id="publishBtn" style="flex:1;">
                                    📢 公布結果
                                </button>
                                <button class="btn btn-danger" id="closeSessionBtn" style="flex:1;">
                                    🔒 關閉報名
                                </button>
                            </div>
                            <button class="btn btn-outline btn-block" id="deleteSessionBtn"
                                style="margin-top: 10px; color: var(--accent-danger); border-color: var(--accent-danger);">
                                🗑️ 刪除場次
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Sidebar: Quick Stats -->
                <div class="admin-sidebar">
                    <div class="card">
                        <div class="card-header">
                            <span class="icon">📊</span>
                            <h2>快速統計</h2>
                        </div>
                        <div id="quickStats">
                            <div class="status-bar" style="margin-bottom: 8px;">
                                <span style="font-size: 0.85rem;">總報名人數</span>
                                <strong id="statTotal" style="color: var(--accent-primary-light);">0</strong>
                            </div>
                            <div class="status-bar" style="margin-bottom: 8px;">
                                <span style="font-size: 0.85rem;">正選</span>
                                <strong id="statSelected" style="color: var(--accent-secondary);">0</strong>
                            </div>
                            <div class="status-bar" style="margin-bottom: 8px;">
                                <span style="font-size: 0.85rem;">備取</span>
                                <strong id="statWaitlist" style="color: var(--accent-warning);">0</strong>
                            </div>
                            <div class="status-bar">
                                <span style="font-size: 0.85rem;">有遲到紀錄</span>
                                <strong id="statLate" style="color: var(--accent-danger);">0</strong>
                            </div>
                        </div>
                    </div>

                    <!-- Copy Roster -->
                    <div class="card" style="margin-top: 16px;">
                        <div class="card-header">
                            <span class="icon">📋</span>
                            <h2>匯出名單</h2>
                        </div>
                        <button class="btn btn-outline btn-block" id="copyRosterBtn">📋 複製正選名單</button>
                        <button class="btn btn-outline btn-block" id="copyAllBtn" style="margin-top: 8px;">📋
                            複製全部名單</button>
                    </div>

                    <!-- Announcement -->
                    <div class="card" style="margin-top: 16px;">
                        <div class="card-header">
                            <span class="icon">📢</span>
                            <h2>發送公告</h2>
                        </div>
                        <div class="form-group">
                            <input type="text" id="announceInput" class="form-input" placeholder="輸入公告內容..."
                                maxlength="200">
                        </div>
                        <button class="btn btn-primary btn-block" id="announceBtn">📢 發送公告</button>
                        <div class="announce-templates" style="margin-top: 10px;">
                            <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px;">快速樣板：</p>
                            <div class="btn-group" style="flex-wrap: wrap;">
                                <button class="btn btn-xs btn-outline announce-tpl">🎮 正在進行遊戲中</button>
                                <button class="btn btn-xs btn-outline announce-tpl">⏳ 請稍等，前一場尚未結束</button>
                                <button class="btn btn-xs btn-outline announce-tpl">✅ 輪到下一組了！</button>
                                <button class="btn btn-xs btn-outline announce-tpl">🔔 請準備上線</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: Registrations -->
        <div class="tab-content" id="tab-registrations">
            <div class="card">
                <div class="card-header">
                    <span class="icon">👥</span>
                    <h2>報名列表</h2>
                    <span class="badge badge-open" id="regCountBadge">0 人</span>
                </div>
                <div id="registrationsList">
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>還沒有人報名</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: Chat -->
        <div class="tab-content" id="tab-chat">
            <div class="card">
                <div class="card-header">
                    <span class="icon">💬</span>
                    <h2>聊天室</h2>
                    <button class="btn btn-xs btn-danger" id="clearChatBtn" style="margin-left: auto;">🗑️ 清除對話</button>
                </div>
                <div style="padding: 8px 10px; border-bottom: 1px solid var(--border-color);">
                    <div style="display:flex;gap:6px;align-items:center;">
                        <label style="font-size:0.75rem;color:var(--text-muted);white-space:nowrap;">顯示名稱</label>
                        <input type="text" class="form-input" id="adminDisplayName" placeholder="🎮 主辦人" maxlength="30"
                            style="padding:4px 8px;font-size:0.8rem;flex:1;">
                    </div>
                </div>
                <div class="chat-messages" id="adminChatMessages" style="height: 350px;">
                    <div class="empty-state" id="adminChatEmpty">
                        <p style="font-size: 0.8rem;">還沒有訊息</p>
                    </div>
                </div>
                <div class="chat-input-row">
                    <button class="btn btn-ghost emoji-toggle" id="adminEmojiBtn" type="button" title="表情">😊</button>
                    <input type="text" class="form-input" id="adminChatInput" placeholder="以主辦人身份發送訊息..."
                        maxlength="500" autocomplete="off">
                    <button class="btn btn-primary" id="adminChatSendBtn">發送</button>
                </div>
                <div class="emoji-picker" id="adminEmojiPicker"></div>
            </div>
        </div>

        <!-- Tab: Settings -->
        <div class="tab-content" id="tab-settings">
            <div class="admin-layout">
                <div>
                    <!-- Background Image -->
                    <div class="card">
                        <div class="card-header">
                            <span class="icon">🖼️</span>
                            <h2>背景圖片</h2>
                        </div>
                        <div class="file-upload-area" id="bgUploadArea">
                            <div class="upload-icon">📁</div>
                            <p>點擊選擇圖片或拖拽到此處</p>
                            <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">支援
                                JPG、PNG、GIF、WebP（最大 10MB）</p>
                            <input type="file" id="bgFileInput" accept=".jpg,.jpeg,.png,.gif,.webp">
                        </div>
                        <div id="currentBgPreview" style="margin-top: 12px; display: none;">
                            <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 8px;">目前背景：</p>
                            <img id="bgPreviewImg"
                                style="width: 100%; border-radius: var(--radius-sm); max-height: 200px; object-fit: cover;">
                            <div class="bg-editor" style="margin-top: 12px;">
                                <div class="form-group">
                                    <label>顯示模式</label>
                                    <select id="bgSizeSelect" class="form-input">
                                        <option value="cover">填滿畫面 (cover)</option>
                                        <option value="contain">完整顯示 (contain)</option>
                                        <option value="100% 100%">拉伸填滿 (stretch)</option>
                                    </select>
                                </div>
                                <div class="config-grid">
                                    <div class="form-group">
                                        <label>水平位置</label>
                                        <select id="bgPosX" class="form-input">
                                            <option value="left">左</option>
                                            <option value="center" selected>中</option>
                                            <option value="right">右</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>垂直位置</label>
                                        <select id="bgPosY" class="form-input">
                                            <option value="top">上</option>
                                            <option value="center" selected>中</option>
                                            <option value="bottom">下</option>
                                        </select>
                                    </div>
                                </div>
                                <button class="btn btn-outline btn-block" id="saveBgSettingsBtn">💾 儲存背景設定</button>
                            </div>
                            <div style="display:flex; gap:8px; margin-top:8px;">
                                <button class="btn btn-sm btn-outline" id="cropBgBtn">✂️ 裁切圖片</button>
                                <button class="btn btn-sm btn-danger" id="removeBgBtn">移除背景</button>
                            </div>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="card" style="margin-top: 16px;">
                        <div class="card-header">
                            <span class="icon">🔑</span>
                            <h2>修改密碼</h2>
                        </div>
                        <div class="form-group">
                            <label>新密碼</label>
                            <input type="password" id="newPassword" class="form-input" placeholder="輸入新密碼"
                                minlength="4">
                        </div>
                        <button class="btn btn-outline btn-block" id="changePasswordBtn">更新密碼</button>
                    </div>
                </div>

                <!-- Late Records -->
                <div>
                    <div class="card">
                        <div class="card-header">
                            <span class="icon">⚠️</span>
                            <h2>遲到紀錄</h2>
                        </div>
                        <div id="lateRecordsList">
                            <div class="empty-state">
                                <p style="font-size: 0.85rem;">沒有遲到紀錄</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Crop Modal -->
    <div id="cropModal" class="crop-modal" style="display:none;">
        <div class="crop-modal-inner">
            <h3 style="margin-bottom:12px;">✂️ 裁切背景圖片</h3>
            <div style="max-height:60vh; overflow:hidden;">
                <img id="cropImage" style="max-width:100%; display:block;">
            </div>
            <div style="display:flex; gap:10px; margin-top:16px; justify-content:flex-end;">
                <button class="btn btn-outline" id="cropCancelBtn">取消</button>
                <button class="btn btn-primary" id="cropApplyBtn">✅ 套用裁切</button>
            </div>
        </div>
    </div>

    <!-- Notification sound -->
    <audio id="notifSound" preload="auto">
        <source src="data:audio/wav;base64,UklGRl9vT19teleVibmFtZQBNaWNyb3NvZnQgU291bmQgU3RyZWFtaW5nIEF1ZGlvIENvZGVj"
            type="audio/wav">
    </audio>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    <script src="/js/admin.js"></script>
</body>

</html>
