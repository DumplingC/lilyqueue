<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="莉刻報名系統 - 填寫遊戲 ID 即可報名">
  <meta name="theme-color" content="#7c5cff">
  <title>🎮 莉刻報名系統</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/pro-theme.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <style>
    .gradient-title {
      background: linear-gradient(135deg, #8B5CF6, #D946EF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>

<body>
  <div class="app-wrapper" id="app">

    <!-- Compact Header -->
    <header class="app-header">
      <div class="header-brand">
        <img src="/icons/logo-pro.png" class="pro-logo pro-only" alt="Logo">
        <h1 id="userSystemName" class="gradient-title"><span class="emoji-only">🎮 </span>莉刻報名系統<span
            class="pro-badge">PRO</span></h1>
        <p class="subtitle" id="sessionTitle">載入中...</p>
        <div id="countdownTimer" style="display:none; font-size:0.78rem; color:var(--accent-warning); font-weight:600;">
          ⏱️ <span id="countdownText"></span>
        </div>
      </div>
      <!-- Controls -->
      <div class="header-controls">
        <select id="langSwitcher" class="lang-select" title="Language">
          <option value="zh-TW">中文</option>
          <option value="en">EN</option>
          <option value="ja">日本語</option>
        </select>
        <button id="themeToggleBtn" class="theme-toggle-btn" title="Dark/Light">🌙</button>
        <button id="muteToggleBtn" class="theme-toggle-btn" title="切換聲音">🔊</button>
      </div>
    </header>

    <!-- Status Bar -->
    <div class="status-strip">
      <div class="status-left">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">連線中...</span>
      </div>
      <div class="status-right" id="slotCounter">--</div>
    </div>
    <div class="progress-bar progress-bar-top">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>

    <!-- Main Content Area (two-col on desktop, single-col on mobile) -->
    <main class="main-layout">
      <!-- LEFT / TOP: Status & Forms -->
      <section class="panel-primary">
        <!-- Registration Form -->
        <div class="card" id="registerCard" style="display: none;">
          <div class="card-header">
            <span class="icon emoji-only">📝</span>
            <i data-lucide="clipboard-list" class="pro-icon pro-only"></i>
            <h2>填寫報名資料</h2>
          </div>
          <form id="registerForm">
            <div class="form-group">
              <label for="gameId">遊戲 ID <span class="required">*</span></label>
              <input type="text" id="gameId" class="form-input" placeholder="輸入你的遊戲 ID" required maxlength="50"
                autocomplete="off">
            </div>
            <div class="form-group">
              <label for="displayName">顯示名稱（選填）</label>
              <input type="text" id="displayName" class="form-input" placeholder="你想顯示的名稱" maxlength="50"
                autocomplete="off">
            </div>
            <!-- CAPTCHA (hidden if disabled) -->
            <div class="form-group" id="captchaGroup" style="display:none;">
              <label>🧩 驗證：<span id="captchaQuestion"></span></label>
              <input type="number" id="captchaAnswer" class="form-input" placeholder="請輸入答案" autocomplete="off">
              <input type="hidden" id="captchaToken">
            </div>
            <!-- Rules Agreement (hidden if disabled) -->
            <div class="form-group" id="rulesGroup" style="display:none;">
              <div
                style="background:var(--bg-glass-strong); border-radius:6px; padding:8px; font-size:0.75rem; max-height:80px; overflow-y:auto; margin-bottom:6px; white-space:pre-wrap;"
                id="rulesDisplay"></div>
              <label style="display:flex; align-items:center; gap:6px; font-size:0.8rem; cursor:pointer;">
                <input type="checkbox" id="rulesAgree">
                <span>我已閱讀並同意以上規則</span>
              </label>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
              <span>🚀</span> 確認報名
            </button>
          </form>
          <div style="text-align:center; margin-top:8px;">
            <button class="btn btn-ghost" id="historyLookupBtn" style="font-size:0.75rem; color:var(--text-muted);">📜
              查詢我的歷史報名紀錄</button>
          </div>
        </div>

        <!-- Status Display (shows after registration) -->
        <div class="card status-result-card" id="statusDisplayCard" style="display: none;">
          <div class="status-result-inner">
            <div class="status-result-icon" id="statusIcon">⏳</div>
            <h3 class="status-result-title" id="statusTitle">等待管理員審核</h3>
            <p class="status-result-msg" id="statusMessage">已收到您的報名資料，請等待主辦人審核</p>
            <p class="status-result-id" id="registeredGameId"></p>
            <div class="status-result-position">
              📋 排隊順序：第 <strong id="positionNum">-</strong> 位
            </div>
            <div class="late-warning" id="lateWarning" style="display: none;">
              ⚠️ 您有遲到紀錄，將由管理員決定是否錄取
            </div>
            <div class="status-badge-row">
              <span class="badge badge-pending" id="myStatusBadge">⏳ 審核中</span>
            </div>
            <div id="confirmCodeDisplay"
              style="display:none; margin-top:10px; padding:8px; background:var(--bg-glass-strong); border-radius:6px; text-align:center;">
              <div style="font-size:0.7rem; color:var(--text-muted);">🔐 報名確認碼（取消用）</div>
              <div id="confirmCodeValue"
                style="font-size:1.2rem; font-weight:bold; letter-spacing:3px; color:var(--accent-primary); margin:4px 0;">
              </div>
            </div>
            <button class="btn btn-outline btn-block" id="cancelRegBtn"
              style="display:none; margin-top:8px; font-size:0.8rem; color:var(--accent-danger); border-color:var(--accent-danger);">
              ❌ 取消報名
            </button>
          </div>
        </div>

        <!-- Closed -->
        <div class="card" id="closedCard" style="display: none;">
          <div class="empty-state" style="text-align:center;">
            <img src="/icons/empty-closed.png" alt="" style="width:96px; height:96px; margin:0 auto 16px; opacity:0.7;">
            <p>目前沒有開放報名的場次</p>
            <p class="hint">請等待主辦人開啟報名</p>
            <div id="countdownContainer" style="display:none; margin-top:16px;">
              <p style="font-size:0.82rem; color:var(--accent-primary);">⏰ 下一場報名即將開放</p>
              <div id="countdownTimer"
                style="font-size:1.6rem; font-weight:700; color:var(--text-primary); font-family:monospace; margin-top:6px;">
              </div>
            </div>
          </div>
        </div>

        <!-- Results -->
        <div class="card" id="resultsCard" style="display: none;">
          <div class="card-header">
            <span class="icon emoji-only">📊</span>
            <i data-lucide="bar-chart-3" class="pro-icon pro-only"></i>
            <h2>錄取結果</h2>
          </div>
          <div class="results-section" id="resultsContent"></div>
        </div>
      </section>

      <!-- RIGHT / BOTTOM: Chat (visible after registration) -->
      <section class="panel-chat" id="chatColumn" style="display: none;">
        <!-- Announcement Banner -->
        <div class="announcement-banner" id="announcementBanner" style="display: none;">
          <span class="announcement-icon">📢</span>
          <span class="announcement-text" id="announcementText"></span>
        </div>
        <!-- Mobile tab buttons -->
        <div class="chat-tabs">
          <button class="chat-tab active" data-tab="messages">💬 聊天</button>
          <button class="chat-tab" data-tab="online">👥 在線 <span class="online-count-badge"
              id="onlineCountBadge">0</span></button>
          <div class="my-status-inline">
            <select class="form-input form-input-xs" id="myUserStatus">
              <option value="在線">🟢 在線</option>
              <option value="暫離">🟡 暫離</option>
              <option value="稍等一下">🔴 稍等一下</option>
            </select>
          </div>
        </div>

        <!-- Chat messages tab -->
        <div class="chat-tab-content active" id="tabMessages">
          <div class="chat-messages" id="chatMessages">
            <div class="empty-state" id="chatEmpty">
              <p style="font-size: 0.8rem;">還沒有訊息，來打個招呼吧！</p>
            </div>
          </div>
          <div class="emoji-picker" id="emojiPicker"></div>
          <div class="chat-input-row">
            <button class="btn btn-ghost emoji-toggle" id="emojiBtn" type="button" title="表情">😊</button>
            <input type="text" class="form-input" id="chatInput" placeholder="輸入訊息..." maxlength="500"
              autocomplete="off">
            <button class="btn btn-primary btn-send" id="chatSendBtn">
              <span class="send-icon">➤</span>
            </button>
          </div>
        </div>

        <!-- Online list tab -->
        <div class="chat-tab-content" id="tabOnline">
          <div class="online-list-full" id="onlineList">
            <p class="online-empty">暫無在線用戶</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => { });
    }
  </script>
</body>

</html>
